# Netlify：部署起势 Web 前端（Next.js）
# 控制台：https://app.netlify.com/
# 详细步骤见 DEPLOY-NETLIFY.md

[build]
  base = "qishi-login"
  command = "npm ci && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
